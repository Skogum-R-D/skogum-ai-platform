apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa
  labels:
    app: qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qa
  template:
    metadata:
      labels:
        app: qa
    spec:
      containers:
        - name: qa
          image: skogum/qa:latest
          env:
            - name: VALKEY_URL
              value: "valkey://valkey:6379"
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mistral-secret
                  key: api-key
            - name: QA_MODEL
              value: "devstral-latest"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: token
            - name: GH_ORG
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: org
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import valkey; valkey.from_url('valkey://valkey:6379').ping()"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
